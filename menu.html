<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Menu | Kannan's Cafe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #c9a050;
      --bg: #0f0f0f;
      --text: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .menu-header {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back-btn {
      color: var(--text);
      text-decoration: none;
      font-size: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--primary);
    }

    .menu-container {
      flex: 1;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .menu-image {
      width: 100%;
      max-width: 800px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Auto-resolution for desktop */
    @media (min-width: 768px) {
      .menu-container {
        padding: 40px;
      }
    }
  </style>
</head>
<body>
  <header class="menu-header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h1>Our Special Menu</h1>
  </header>

  <main class="menu-container">
    <img src="menu.jpeg" alt="Full Menu" class="menu-image">
  </main>

  <footer style="padding: 20px; text-align: center; color: #666; font-size: 12px;">
    &copy; 2024 Kannan's Cafe & Snack Bar
  </footer>
</body>
</html>
